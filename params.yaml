# marl-av experiment parameters

env:
  dt: 0.1
  max_steps: 400
  goal_threshold: 2.0

rewards:
  collision_penalty: -100.0
  goal_reward: 50.0
  time_penalty: -0.05
  efficiency_weight: 0.5
  min_safe_distance: 5.0
  progress_weight: 0.1

svo:
  agent_1_degrees: 45.0
  agent_2_degrees: 0.0

q_learning:
  learning_rate: 0.1
  discount: 0.99
  epsilon_start: 1.0
  epsilon_min: 0.05
  epsilon_decay: 0.995

training:
  num_episodes: 5000
  log_interval: 100
  verbose: true

evaluation:
  num_eval_episodes: 200
  baselines:
    - ["cautious", "aggressive"]
    - ["yield", "aggressive"]
    - ["priority", "yield"]
  unseen_mixture_policies: ["aggressive", "cautious", "yield", "priority"]
  game_baseline_candidates: ["constant", "cautious", "aggressive", "yield", "priority"]

ablations:
  svo_angles_degrees: [0.0, 22.5, 45.0, 67.5]

seeds: [0, 1, 2]

output:
  results_dir: "results"
